<title>Kolase</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#f2f2f7;
  --bg2:#ffffff;
  --bg3:#f2f2f7;
  --grouped:#ffffff;
  --label:#000000;
  --label2:rgba(60,60,67,0.6);
  --label3:rgba(60,60,67,0.3);
  --separator:rgba(60,60,67,0.12);
  --blue:#007aff;
  --blue-bg:rgba(0,122,255,0.12);
  --red:#ff3b30;
  --green:#34c759;
  --orange:#ff9500;
  --pink:#ff2d55;
  --purple:#af52de;
  --teal:#5ac8fa;
  --fill:rgba(120,120,128,0.2);
  --fill2:rgba(120,120,128,0.16);
  --fill3:rgba(118,118,128,0.12);
  --radius-sm:10px;
  --radius:13px;
  --radius-lg:16px;
  --radius-xl:20px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}

html,body{height:100%;overflow:hidden;}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--label);
  display:flex;
  flex-direction:column;
  max-width:430px;
  margin:0 auto;
  position:relative;
  height:100dvh;
  overflow:hidden;
}



/* ── NAV BAR ── */
.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:2px 16px 8px;
  flex-shrink:0;
}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-0.4px;}
.nav-btn{
  background:var(--fill3);
  border:none;
  border-radius:99px;
  width:32px;height:32px;

/* ── SCROLL CONTENT ── */
.scroll-content{

/* ── CANVAS AREA ── */
.canvas-section{

}
.canvas-card{

  box-shadow:0 2px 20px rgba(0,0,0,0.08);

}
.collage{
  display:grid;
  width:100%;

  background:#fff;

.collage-cell{

.drop-hint{

}

}
.cell-edit-overlay{

/* canvas text */
.canvas-text-el{

}

/* canvas sticker */
.canvas-sticker{

  font-size:2rem;

/* ── LAYOUT CHIPS ── */
.layout-chip{

}

<script>
// ── STATE ──
const S = {
  photos:[], layout:3, gap:4, radius:0, bg:'#ffffff',
  ratio:'1:1', text:'', textColor:'#ffffff',
  textFont:"'Inter',sans-serif", stickers:[], selectedSticker:null,
  ctxCellIdx:null,
};

const LAYOUTS=[
  // small
  {cells:1, cols:1,rows:1},
  {cells:2, cols:2,rows:1},
  {cells:2, cols:1,rows:2},
  {cells:3, cols:3,rows:1},
  {cells:3, template:'2fr 1fr',rows_t:'1fr 1fr',areas:'"a b"\n"a c"'},
  {cells:3, template:'1fr 2fr',rows_t:'1fr 1fr',areas:'"a b"\n"c b"'},
  {cells:4, cols:2,rows:2},
  {cells:4, cols:4,rows:1},
  {cells:4, template:'1fr 1fr 1fr',rows_t:'2fr 1fr',areas:'"a a a"\n"b c d"'},
  {cells:5, cols:5,rows:1},
  {cells:5, template:'1fr 1fr 1fr',rows_t:'1fr 1fr',areas:'"a b c"\n"d d c"'},
  {cells:6, cols:3,rows:2},
  {cells:6, cols:6,rows:1},
  {cells:6, template:'2fr 1fr 1fr',rows_t:'1fr 1fr 1fr',areas:'"a a b"\n"a a c"\n"d e f"'},
  // medium
  {cells:8, cols:4,rows:2},
  {cells:9, cols:3,rows:3},
  {cells:10,cols:5,rows:2},
  {cells:12,cols:4,rows:3},
  {cells:12,cols:6,rows:2},
  {cells:15,cols:5,rows:3},
  // large
  {cells:16,cols:4,rows:4},
  {cells:20,cols:5,rows:4},
  {cells:20,cols:4,rows:5},
  {cells:25,cols:5,rows:5},
];

// Generate thumb matrix for a layout
function makeThumb(L){
  if(L.areas) {
    // parse areas to matrix
    const areaRows=L.areas.replace(/"/g,'').trim().split('\n').map(r=>r.trim().split(/\s+/));
    const names=[...new Set(areaRows.flat())];
    return areaRows.map(row=>row.map(a=>names.indexOf(a)+1));
  }
  // pure grid
  const {cols,rows}=L;
  let n=1;
  return Array.from({length:rows},()=>Array.from({length:cols},()=>n++));
}

const LAYOUT_THUMBS=LAYOUTS.map(makeThumb);
const RATIOS=[
  {label:'1:1',w:1,h:1},{label:'4:3',w:4,h:3},{label:'3:4',w:3,h:4},
  {label:'16:9',w:16,h:9},{label:'9:16',w:9,h:16},
];
const BG_COLORS=['#ffffff','#f2f2f7','#000000','#1c1c1e','#ff3b30','#007aff','#34c759','#ff9500','#ff2d55','#af52de','#5ac8fa','#e8d5c4'];
const TEXT_COLORS=['#ffffff','#000000','#ff3b30','#007aff','#ff9500','#34c759','#ffcc00'];
const STICKERS=['❤️','⭐','🌟','🔥','✨','🌸','🌈','🎉','💫','😊','🦋','🌺','🎀','💕','🌙','☀️','🍀','🎵','📸','💎','🫶','🥰','👑','🌊','🍃'];

function init(){
  buildLayouts(); buildRatios();
  selectLayout(3); selectRatio('1:1');
}

// ── LAYOUTS ──
function buildLayouts(){
  const row=document.getElementById('layoutsRow');
  row.innerHTML='';
  LAYOUT_THUMBS.forEach((thumb,i)=>{
    const L=LAYOUTS[i];
    const chip=document.createElement('div');
    chip.className='layout-chip'+(i===S.layout?' active':'');
    chip.dataset.idx=i;
    // for large grids, show a simple label instead of mini grid
    if(L.cells>=8){
      chip.style.display='flex';chip.style.flexDirection='column';
      chip.style.alignItems='center';chip.style.justifyContent='center';chip.style.gap='2px';
      const grid=document.createElement('div');
      const cols=L.cols||2;
      const rows=L.rows||2;
      // draw max 4x4 preview
      const previewCols=Math.min(cols,5);
      const previewRows=Math.min(rows,5);
      grid.style.cssText=`display:grid;grid-template-columns:repeat(${previewCols},1fr);grid-template-rows:repeat(${previewRows},1fr);gap:2px;width:36px;height:36px;`;
      for(let c=0;c<previewCols*previewRows;c++){
        const cel=document.createElement('div');
        cel.className='lc';
        grid.appendChild(cel);
      }
      const lbl=document.createElement('span');
      lbl.style.cssText='font-size:9px;font-weight:700;color:var(--label2);margin-top:1px';
      lbl.textContent=L.cells;
      chip.appendChild(grid);chip.appendChild(lbl);
    } else {
      const rows=thumb.length,cols=thumb[0].length;
      chip.style.gridTemplateColumns=`repeat(${cols},1fr)`;
      chip.style.gridTemplateRows=`repeat(${rows},1fr)`;
      const placed=new Set();
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        const id=thumb[r][c];
        if(!placed.has(id)){
          placed.add(id);
          const cell=document.createElement('div');
          cell.className='lc';
          let rs=0,cs=0;
          for(let r2=r;r2<rows&&thumb[r2][c]===id;r2++) rs++;
          for(let c2=c;c2<cols&&thumb[r][c2]===id;c2++) cs++;
          if(rs>1)cell.style.gridRow=`span ${rs}`;
          if(cs>1)cell.style.gridColumn=`span ${cs}`;
          chip.appendChild(cell);
        }
      }
    }
    chip.onclick=()=>selectLayout(i);
    row.appendChild(chip);
  });
}

function selectLayout(idx){
  S.layout=idx;
  document.querySelectorAll('.layout-chip').forEach((c,i)=>c.classList.toggle('active',i===idx));
  renderCollage();
}

// ── RATIOS ──
function buildRatios(){
  const row=document.getElementById('ratioRow');
  row.innerHTML='';
  RATIOS.forEach(r=>{
    const chip=document.createElement('div');
    chip.className='layout-chip'+(r.label===S.ratio?' active':'');
    chip.dataset.ratio=r.label;
    chip.style.display='flex';chip.style.flexDirection='column';
    chip.style.alignItems='center';chip.style.justifyContent='center';chip.style.gap='3px';
    const maxSide=36;
    let w,h;
    if(r.w>=r.h){w=maxSide;h=Math.round(maxSide*(r.h/r.w));}
    else{h=maxSide;w=Math.round(maxSide*(r.w/r.h));}
    const box=document.createElement('div');
    box.style.cssText=`width:${w}px;height:${h}px;background:var(--fill2);border-radius:3px;transition:background .15s`;
    const lbl=document.createElement('span');
    lbl.style.cssText='font-size:10px;font-weight:600;color:var(--label2)';
    lbl.textContent=r.label;
    chip.appendChild(box);chip.appendChild(lbl);
    chip.onclick=()=>selectRatio(r.label);
    row.appendChild(chip);
  });
}

function selectRatio(label){
  S.ratio=label;
  document.querySelectorAll('#ratioRow .layout-chip').forEach(c=>c.classList.toggle('active',c.dataset.ratio===label));
  const r=RATIOS.find(x=>x.label===label);
  const collage=document.getElementById('collage');
  // set aspect-ratio on collage
  collage.style.aspectRatio=`${r.w}/${r.h}`;
  renderCollage();
}

// ── RENDER COLLAGE ──
function renderCollage(){
  const collage=document.getElementById('collage');
  const L=LAYOUTS[S.layout];
  const areaNames=['a','b','c','d','e','f'];

  // save assigned photos per cell
  const oldCells=[...collage.querySelectorAll('.collage-cell')];
  const saved=oldCells.map(c=>c.dataset.photoIdx!==''?c.dataset.photoIdx:undefined);

  collage.innerHTML='';

  // grid template
  if(L.areas){
    collage.style.gridTemplateColumns=L.template;
    collage.style.gridTemplateRows=L.rows_t||'auto';
    collage.style.gridTemplateAreas=L.areas;
  } else {
    const cols=L.cols||1;
    const rows=L.rows||1;
    collage.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    collage.style.gridTemplateRows=`repeat(${rows},1fr)`;
    collage.style.gridTemplateAreas='';
  }

  collage.style.gap=S.gap+'px';
  collage.style.padding=S.gap+'px';
  collage.style.background=S.bg;

  const r=RATIOS.find(x=>x.label===S.ratio)||RATIOS[0];
  collage.style.aspectRatio=`${r.w}/${r.h}`;

  // hide hint text for large grids
  const isLarge=L.cells>=8;

  for(let i=0;i<L.cells;i++){
    const cell=document.createElement('div');
    cell.className='collage-cell';
    cell.dataset.cellIdx=i;
    cell.dataset.photoIdx='';
    if(L.areas)cell.style.gridArea=areaNames[i];
    cell.style.borderRadius=S.radius+'px';

    const hint=document.createElement('div');
    hint.className='drop-hint';
    hint.innerHTML=isLarge
      ?'<div class="dh-icon" style="width:20px;height:20px;font-size:10px">+</div>'
      :'<div class="dh-icon">+</div><span class="dh-text">Foto</span>';
    cell.appendChild(hint);

    // restore photo
    const assignedIdx=i<saved.length&&saved[i]!==undefined?parseInt(saved[i]):i;
    if(assignedIdx<S.photos.length){
      setPhotoInCell(cell,assignedIdx);
    }

    // long-press + drag to swap
    makeCellDraggable(cell, i);

    collage.appendChild(cell);
  }

  renderCollage._built=true;
}

// ── LONG-PRESS DRAG TO SWAP ──
let dragState=null;
let longPressTimer=null;
const LONG_PRESS_MS=400;

function makeCellDraggable(cell, cellIdx){
  // pointer events for long-press drag
  cell.addEventListener('pointerdown', e=>{
    if(e.button!==0&&e.button!==undefined&&e.pointerType==='mouse'&&e.button!==0)return;
    longPressTimer=setTimeout(()=>{
      if(!cell.classList.contains('has-img'))return;
      startCellDrag(cell, cellIdx, e);
    }, LONG_PRESS_MS);
  });

  cell.addEventListener('pointerup', cancelLongPress);
  cell.addEventListener('pointermove', e=>{
    // cancel long press if moved too much
    if(longPressTimer&&dragState===null){
      cancelLongPress();
    }
  });

  // tap = open ctx or pick photo
  cell.addEventListener('click', e=>{
    if(dragState)return; // was a drag, not a tap
    if(cell.classList.contains('has-img')){
      showCtx(cellIdx, e);
    } else {
      S._pendingCell=cellIdx; triggerUpload();
    }
  });
}

function cancelLongPress(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
}

function startCellDrag(sourceCell, sourceCellIdx, e){
  cancelLongPress();
  const collage=document.getElementById('collage');

  // ghost image
  const ghost=sourceCell.cloneNode(true);
  ghost.style.cssText=`
    position:fixed;pointer-events:none;z-index:1000;
    width:${sourceCell.offsetWidth}px;height:${sourceCell.offsetHeight}px;
    border-radius:12px;opacity:0.88;
    box-shadow:0 16px 48px rgba(0,0,0,0.3);
    transform:scale(1.06);transition:transform 0.1s;
    overflow:hidden;
  `;
  document.body.appendChild(ghost);

  // dim source
  sourceCell.style.opacity='0.35';
  sourceCell.style.transition='opacity 0.2s';

  let currentTarget=null;

  function moveGhost(clientX, clientY){
    ghost.style.left=(clientX - sourceCell.offsetWidth/2)+'px';
    ghost.style.top=(clientY - sourceCell.offsetHeight/2)+'px';

    // find which cell is under pointer
    ghost.style.display='none';
    const el=document.elementFromPoint(clientX, clientY);
    ghost.style.display='';
    const target=el?.closest('.collage-cell');

    if(target && target!==sourceCell){
      if(target!==currentTarget){
        if(currentTarget)currentTarget.style.outline='';
        currentTarget=target;
        target.style.outline='3px solid var(--blue)';
        target.style.outlineOffset='-3px';
      }
    } else {
      if(currentTarget){currentTarget.style.outline='';currentTarget=null;}
    }
  }

  // initial position
  moveGhost(e.clientX, e.clientY);

  // vibrate on start (mobile)
  if(navigator.vibrate) navigator.vibrate(10);

  dragState={sourceCell, sourceCellIdx};

  function onMove(ev){
    const pt=ev.touches?ev.touches[0]:ev;
    moveGhost(pt.clientX, pt.clientY);
  }
  function onEnd(ev){
    const pt=ev.changedTouches?ev.changedTouches[0]:ev;

    // find drop target
    ghost.style.display='none';
    const el=document.elementFromPoint(pt.clientX, pt.clientY);
    ghost.style.display='';
    const target=el?.closest('.collage-cell');

    if(target && target!==sourceCell){
      swapCells(sourceCell, target);
    }

    // cleanup
    ghost.remove();
    sourceCell.style.opacity='';
    if(currentTarget)currentTarget.style.outline='';
    dragState=null;

    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onEnd);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onEnd);
  document.addEventListener('touchmove', onMove, {passive:true});
  document.addEventListener('touchend', onEnd);
}

function swapCells(a, b){
  const idxA=a.dataset.photoIdx;
  const idxB=b.dataset.photoIdx;
  const imgA=a.querySelector('img');
  const imgB=b.querySelector('img');

  if(imgA&&imgB){
    // both have images — swap src
    const srcA=imgA.src;
    imgA.src=imgB.src;
    imgB.src=srcA;
    const piA=a.dataset.photoIdx;
    a.dataset.photoIdx=b.dataset.photoIdx;
    b.dataset.photoIdx=piA;
  } else if(imgA&&!imgB){
    // move A to B
    const newImg=imgA.cloneNode();
    b.insertBefore(newImg,b.firstChild);
    b.classList.add('has-img');
    b.dataset.photoIdx=idxA;
    imgA.remove();
    a.classList.remove('has-img');
    a.dataset.photoIdx='';
  } else if(imgB&&!imgA){
    // move B to A
    const newImg=imgB.cloneNode();
    a.insertBefore(newImg,a.firstChild);
    a.classList.add('has-img');
    a.dataset.photoIdx=idxB;
    imgB.remove();
    b.classList.remove('has-img');
    b.dataset.photoIdx='';
  }

  if(navigator.vibrate) navigator.vibrate(8);
}

function setPhotoInCell(cell,idx){
  if(idx<0||idx>=S.photos.length)return;
  cell.dataset.photoIdx=idx;
  const old=cell.querySelector('img');if(old)old.remove();
  const img=document.createElement('img');img.src=S.photos[idx];img.alt='';
  cell.insertBefore(img,cell.firstChild);
  cell.classList.add('has-img');
}

// ── CTX MENU ──
let _ctxCell=null;
function showCtx(cellIdx,e){
  _ctxCell=cellIdx;
  document.getElementById('ctxMenu').classList.add('open');
  document.getElementById('ctxOverlay').classList.add('open');
}
function hideCtx(){
  document.getElementById('ctxMenu').classList.remove('open');
  document.getElementById('ctxOverlay').classList.remove('open');
}
function ctxAction(action){
  hideCtx();
  if(action==='change'){S._pendingCell=_ctxCell;triggerUpload();}
  else if(action==='remove'){
    const cells=[...document.querySelectorAll('.collage-cell')];
    if(cells[_ctxCell]){
      const img=cells[_ctxCell].querySelector('img');if(img)img.remove();
      cells[_ctxCell].classList.remove('has-img');
      cells[_ctxCell].dataset.photoIdx='';
    }
  }
}

// ── FILE INPUT ──
function triggerUpload(){document.getElementById('fileInput').click();}
function handleFiles(e){
  const files=[...e.target.files];
  Promise.all(files.map(f=>new Promise(res=>{
    const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsDataURL(f);
  }))).then(urls=>{
    const firstNewIdx=S.photos.length;
    urls.forEach(u=>S.photos.push(u));

    if(S._pendingCell!==undefined){
      // ganti foto di sel tertentu — jangan ganti layout
      renderCollage();
      const cells=[...document.querySelectorAll('.collage-cell')];
      if(cells[S._pendingCell])setPhotoInCell(cells[S._pendingCell],firstNewIdx);
      S._pendingCell=undefined;
    } else {
      // auto-pilih layout paling cocok dengan jumlah foto
      autoSelectLayout(S.photos.length);
    }
  });
  e.target.value='';
}

function autoSelectLayout(count){
  // cari layout yang selnya == count, kalau tidak ada ambil yang >= count terdekat
  let bestIdx=S.layout;
  let bestDiff=Infinity;
  LAYOUTS.forEach((L,i)=>{
    const diff=L.cells-count;
    // prefer layout yang selnya >= jumlah foto, dan paling kecil selisihnya
    if(diff>=0 && diff<bestDiff){
      bestDiff=diff;
      bestIdx=i;
    }
  });
  // kalau semua layout lebih kecil, ambil yang paling banyak sel
  if(bestDiff===Infinity){
    bestIdx=LAYOUTS.reduce((best,L,i)=>L.cells>LAYOUTS[best].cells?i:best,0);
  }
  S.layout=bestIdx;
  document.querySelectorAll('.layout-chip').forEach((c,i)=>c.classList.toggle('active',i===bestIdx));
  renderCollage();
  autoFillCells();
}
function autoFillCells(){
  let pi=0;
  document.querySelectorAll('.collage-cell').forEach(cell=>{
    if(!cell.classList.contains('has-img')&&pi<S.photos.length)setPhotoInCell(cell,pi++);
  });
}
function updatePhotoStrip(){
  const row=document.getElementById('photosRow');
  if(!row) return;
  row.innerHTML='';
  S.photos.forEach((url,i)=>{
    const item=document.createElement('div');
    item.className='photo-item';item.draggable=true;
    item.ondragstart=e=>e.dataTransfer.setData('pi',i);
    const img=document.createElement('img');img.src=url;
    const del=document.createElement('div');
    del.className='pi-del show';del.textContent='✕';
    del.onclick=ev=>{ev.stopPropagation();removePhoto(i);};
    item.appendChild(img);item.appendChild(del);
    item.onclick=()=>assignToEmpty(i);
    row.appendChild(item);
  });
  const add=document.createElement('div');
  add.className='add-photo-chip';
  add.innerHTML='<span class="ap-icon">+</span><span class="ap-text">Tambah</span>';
  add.onclick=triggerUpload;
  row.appendChild(add);
}
function assignToEmpty(idx){
  const empty=[...document.querySelectorAll('.collage-cell')].find(c=>!c.classList.contains('has-img'));
  if(empty)setPhotoInCell(empty,idx);
}
function removePhoto(idx){
  S.photos.splice(idx,1);
  updatePhotoStrip();renderCollage();
}

// ── GAP ──
function updateGap(v){
  S.gap=parseInt(v);
  document.getElementById('gapNum').textContent=v;
  const collage=document.getElementById('collage');
  collage.style.gap=v+'px';collage.style.padding=v+'px';
}

// ── RADIUS ──
function setRadius(r,btn){
  S.radius=r;
  document.querySelectorAll('.rcorner').forEach(b=>{
    b.style.background='var(--fill3)';b.style.color='var(--label)';b.style.borderColor='var(--separator)';
  });
  btn.style.background='var(--blue)';btn.style.color='#fff';btn.style.borderColor='var(--blue)';
  document.querySelectorAll('.collage-cell').forEach(c=>c.style.borderRadius=r+'px');
}

// ── TABS ──
function showTab(name,btn){
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  const t=document.getElementById('tab-'+name);
  if(t)t.classList.add('active');
  btn.classList.add('active');
}
function switchMainTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

// ── CLEAR ──
function clearAll(){
  S.photos=[];S.stickers=[];S.selectedSticker=null;S.text='';
  const ti=document.getElementById('textInput');
  if(ti) ti.value='';
  updatePhotoStrip();renderCollage();
}

// ── DOWNLOAD — custom canvas renderer ──
async function downloadCollage(){
  const RATIO = RATIOS.find(x=>x.label===S.ratio)||RATIOS[0];
  const OUTPUT = 1500; // long side px
  const CW = RATIO.w >= RATIO.h ? OUTPUT : Math.round(OUTPUT*(RATIO.w/RATIO.h));
  const CH = RATIO.h >= RATIO.w ? OUTPUT : Math.round(OUTPUT*(RATIO.h/RATIO.w));
  const GAP = Math.round(S.gap * (CW / document.getElementById('collage').offsetWidth));

  const canvas = document.createElement('canvas');
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext('2d');

  // background
  ctx.fillStyle = S.bg;
  ctx.fillRect(0, 0, CW, CH);

  const L = LAYOUTS[S.layout];
  const cells = [...document.querySelectorAll('.collage-cell')];
  if(!cells.length) return;

  // get each cell's bounding box relative to collage
  const collageEl = document.getElementById('collage');
  const collageRect = collageEl.getBoundingClientRect();
  const scaleX = (CW - GAP*2) / (collageRect.width - S.gap*2 - (L.cols||1)*0 );
  const collagePad = S.gap;

  // build rects from DOM positions — most reliable approach
  const cellRects = cells.map(cell=>{
    const r = cell.getBoundingClientRect();
    const x = GAP + (r.left - collageRect.left - collagePad) * (CW / collageRect.width);
    const y = GAP + (r.top  - collageRect.top  - collagePad) * (CH / collageRect.height);
    const w = r.width  * (CW / collageRect.width);
    const h = r.height * (CH / collageRect.height);
    return {x, y, w, h, photoIdx: cell.dataset.photoIdx};
  });

  // load all images needed
  const imgCache = {};
  await Promise.all(cellRects.map(async cr=>{
    const idx = cr.photoIdx;
    if(idx===''||idx===undefined) return;
    if(imgCache[idx]) return;
    await new Promise(res=>{
      const img = new Image();
      img.onload = ()=>{ imgCache[idx]=img; res(); };
      img.onerror = res;
      img.src = S.photos[parseInt(idx)];
    });
  }));

  // draw each cell
  cellRects.forEach(cr=>{
    const {x,y,w,h,photoIdx} = cr;
    const r = S.radius * (CW / collageRect.width);

    // clip with rounded corners
    ctx.save();
    roundRect(ctx, x, y, w, h, r);
    ctx.clip();

    const img = imgCache[photoIdx];
    if(img){
      // object-fit: cover
      const iw=img.naturalWidth, ih=img.naturalHeight;
      const scale = Math.max(w/iw, h/ih);
      const dw=iw*scale, dh=ih*scale;
      const dx=x+(w-dw)/2, dy=y+(h-dh)/2;
      ctx.drawImage(img, dx, dy, dw, dh);
    } else {
      ctx.fillStyle = 'rgba(120,120,128,0.12)';
      ctx.fillRect(x, y, w, h);
    }
    ctx.restore();
  });

  // trigger download
  const a = document.createElement('a');
  a.download = 'kolase.png';
  a.href = canvas.toDataURL('image/png', 1.0);
  a.click();
}

function roundRect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

init();
renderCollage();
</script>
